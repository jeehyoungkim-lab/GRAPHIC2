<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GRAPHIC Tools</title>
<style>
  /* 원본 레이아웃 및 디자인 유지 */
  html, body { height: 100%; margin:0; font-family: Arial, sans-serif; background-color: #fdfefe; overflow-x: hidden; }
  h2 { color: #0F4E47; text-align:center; padding:20px; margin:0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 15px;
    padding: 20px;
    box-sizing: border-box;
  }

  .tile-box {
    background-color: #0F4E47;
    border: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    aspect-ratio: 1 / 1;
    position: relative;
    overflow: hidden;
    cursor: pointer;
  }

  .tile-title {
    flex: 0 0 40px;
    color: #FDFEFE;
    font-weight: bold;
    font-size: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 5;
  }

  .tile-img-wrap { flex: 1; width: 100%; position: relative; }
  .tile-img { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: fill; z-index: 1; }

  /* [추가된 버튼 레이어] 마우스 올릴 때만 이미지 위에 나타남 */
  .button-overlay {
    position: absolute;
    inset: 0; /* 이미지 영역 전체 차지 */
    display: none; /* 평소엔 숨김 */
    grid-template-columns: 1fr 1fr; /* 2열 */
    grid-auto-rows: 1fr; /* 높이 균등 */
    gap: 2px;
    z-index: 10;
    background: rgba(15, 78, 71, 0.4); /* 이미지 살짝 보임 */
  }

  .tile-img-wrap:hover .button-overlay {
    display: grid; /* 마우스 오버 시에만 그리드로 표시 */
  }

  .btn-item {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.95);
    color: #0F4E47;
    text-decoration: none;
    font-size: 15px;
    font-weight: bold;
    border: 1px solid #0F4E47;
    box-sizing: border-box;
  }

  .btn-item:hover { background: #FFEB3B; color: black; }

  /* 버튼 개수 대응 */
  .btn-item:only-child { grid-column: span 2; }
  .btn-item:nth-child(3):last-child { grid-column: span 2; }

  /* 뷰어 스타일 */
  #viewer { display:none; width:100%; height:100vh; flex-direction: column; }
  #viewer iframe { flex:1; width:100%; border:none; }
  #backBtn { background:#FDFEFE; color:#0F4E47; border:1px solid #0F4E47; border-radius:8px; font-size:18px; font-weight:bold; padding:10px 20px; margin:10px; cursor:pointer; align-self:flex-end; }
</style>
</head>
<body>

<h2 id="mainTitle">Graphs for Research Articles Tools</h2>

<div id="grid" class="grid"></div>

<div id="viewer">
  <button id="backBtn">🏠 Show List of GRAPHIC Tools</button>
  <iframe id="appFrame"></iframe>
</div>

<script>
const apps = [
 { name:"Boxplot and jitter plot", url:"https://play237.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Plot with error bar", url:"https://play240.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 // 테스트용: url에 여러 주소를 넣으면 4분할 버튼이 생깁니다.
 { name:"Plot with significance", url:["https://play241.shinyapps.io", "#link2", "#link3", "#link4"], img:"https://jeehyoungkim-lab.github.io" },
 { name:"RainCloud plot", url:"https://play274.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Densitogram and Histogram", url:"https://play242.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Scatter plot with label", url:"https://play277.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Matrix Correlations", url:"https://play276.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"LOWESS", url:"https://play239.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"count bar with CI", url:"https://play234.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Matrix bubble plot", url:"https://play120.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Alluvial Diagrams(1)", url:"https://play235.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Alluvial Diagrams(2)", url:"https://play236.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Kaplan-Meier curve", url:"https://play236.shinyapps.io", img:"https://raw.githubusercontent.com" },
 { name:"Coefficients Plot", url:"https://play278.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Forest plots for Subgroups", url:"https://play273.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Baseline Table", url:"https://play275.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
];

const grid = document.getElementById("grid");

function openApp(targetUrl) {
  if(!targetUrl || targetUrl.startsWith("#")) return;
  document.getElementById("grid").style.display = "none";
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("appFrame").src = targetUrl;
  document.getElementById("mainTitle").style.display = "none";
}

apps.forEach(app => {
  const tile = document.createElement("div");
  tile.className = "tile-box";

  // 1. 제목 추가
  const titleDiv = document.createElement("div");
  titleDiv.className = "tile-title";
  titleDiv.textContent = app.name;
  tile.appendChild(titleDiv);

  // 2. 이미지 래퍼 생성
  const imgWrap = document.createElement("div");
  imgWrap.className = "tile-img-wrap";

  // 3. 이미지 추가
  const img = document.createElement("img");
  img.className = "tile-img";
  img.src = app.img;
  imgWrap.appendChild(img);

  // 4. 버튼 오버레이 추가
  const overlay = document.createElement("div");
  overlay.className = "button-overlay";

  const urlList = Array.isArray(app.url) ? app.url : [app.url];
  urlList.forEach((link, idx) => {
    const btn = document.createElement("div");
    btn.className = "btn-item";
    btn.textContent = urlList.length > 1 ? `Link ${idx + 1}` : "Run App";
    btn.onclick = (e) => {
      e.stopPropagation(); // 부모 타일 클릭 방지
      openApp(link);
    };
    overlay.appendChild(btn);
  });

  imgWrap.appendChild(overlay);
  tile.appendChild(imgWrap);

  // 타일 자체 클릭 시 (기본 동작 유지)
  tile.onclick = () => {
    if(!Array.isArray(app.url)) openApp(app.url);
  };

  grid.appendChild(tile);
});

document.getElementById("backBtn").onclick = () => {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("grid").style.display = "grid";
  document.getElementById("appFrame").src = "";
  document.getElementById("mainTitle").style.display = "block";
};
</script>
</body>
</html>
