<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="https://jeehyoungkim-lab.github.io/images/analysis2.png">
<title>Graphs for Research Articles Tools</title>
<style>
  html, body { height: 100%; }
  body { font-family: Arial, sans-serif; background-color: #fdfefe; margin:0; overflow-x: hidden; }
  h2 { color: #0F4E47; text-align:center; padding:20px; margin:0; }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 15px;
    padding: 20px;
    box-sizing: border-box;
    max-width: 100%;
  }

  .tile-box {
    background-color: #0F4E47;
    border: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    aspect-ratio: 1 / 1;
    box-sizing: border-box;
    position: relative;
    overflow: hidden;
  }

  .tile-title {
    flex: 0 0 40px;
    color: #FDFEFE;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 5px;
  }

  .tile-img-wrap {
    flex: 1;
    width: 100%;
    height: 100%;
    position: relative;
    overflow: hidden;
  }

  .tile-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
  }

  .tile-overlay {
    position: absolute;
    top: 40px;
    left: 0;
    width: 100%;
    height: calc(100% - 40px);
    background: rgba(15, 78, 71, 0.6); 
    display: grid;
    grid-template-columns: 1fr 1fr; 
    grid-auto-rows: 1fr; 
    gap: 2px; 
    opacity: 0;
    visibility: hidden; 
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  .tile-box:hover .tile-overlay {
    opacity: 1;
    visibility: visible;
  }

  .btn-link {
    background: rgba(253, 254, 254, 0.0001); /* 버튼 기본 배경도 약간 투명하게 조정 가능 */
    color: #0F4E47;
    text-decoration: none;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 15px; 
    font-weight: bold;
    text-align: center;
    border: 1px solid #0F4E47;
    box-sizing: border-box;
  }

  .btn-link:only-child { grid-column: span 2; } 
  .btn-link:nth-child(3):last-child { grid-column: span 2; } 

  .btn-link:hover {
    /* 노란색 투명도 적용 */
    background: rgba(255, 235, 59, 0.3); 
    color: #000;
  }

  #viewer { display:none; width:100%; height:100vh; flex-direction: column; }
  #viewer iframe { flex:1; width:100%; border:none; }
  #backBtn {
    background:#FDFEFE; color:#0F4E47; border:1px solid #0F4E47;
    border-radius:8px; font-size:18px; font-weight:bold;
    padding:10px 20px; margin:10px; cursor:pointer; align-self:flex-end;
  }
</style>
</head>
<body>

<h2 id="mainTitle">Graphs for Research Articles: Precision, Honesty, and Informative Communication(GRAPHIC) Tools</h2>

<div id="grid" class="grid"></div>

<div id="viewer">
  <button id="backBtn">🏠 Show List of GRAPHIC Tools</button>
  <iframe id="appFrame"></iframe>
</div>

<script>

 { name:"RainCloud plot", url:["https://data-play11.shinyapps.io/Cloud_Rain_Plot/", "https://play274.shinyapps.io/RainCloud_Plot/","https://play280.shinyapps.io/Cloud_Rain_Plot/", "https://play281.shinyapps.io/Cloud_Rain_Plot/"], img:"https://jeehyoungkim-lab.github.io/images/raincloud.png" },
 { name:"Densitogram and Histogram", url:["https://play204.shinyapps.io/densitogram-histogram/", "https://play212.shinyapps.io/densitogram-histogram/", "https://play218.shinyapps.io/densitogram-histogram/", "https://play223.shinyapps.io/densitogram-histogram/", "https://play234.shinyapps.io/densitogram-histogram/", "https://play242.shinyapps.io/densitogram-histogram/", "https://play248.shinyapps.io/densitogram-histogram/", "https://play265.shinyapps.io/densitogram-histogram/", "https://play267.shinyapps.io/densitogram-histogram/", "https://play268.shinyapps.io/densitogram-histogram/"], img:"https://jeehyoungkim-lab.github.io/images/tool24.png" },
 { name:"Scatter plot with label", url:["https://play178.shinyapps.io/Scatter_plot_name/", "https://play188.shinyapps.io/Scatter_name4CiOS/", "https://play277.shinyapps.io/Scatter_name/"], img:"https://jeehyoungkim-lab.github.io/images/Scatter%20plot%20with%20name.png" },
 { name:"Matrix Correlations", url:["https://play276.shinyapps.io/MatrixCorrelations/","https://play279.shinyapps.io/GRAPHIC/","https://play280.shinyapps.io/GRAPHIC/"], img:"https://jeehyoungkim-lab.github.io/images/Matrix%20Correlations.png" }, //CiOS Matrix Correlations2.R
 { name:"LOWESS", url:["https://play197.shinyapps.io/LOWESS4/", "https://play207.shinyapps.io/LOWESS4/", "https://play215.shinyapps.io/LOWESS4/", "https://play226.shinyapps.io/LOWESS4/", "https://play229.shinyapps.io/LOWESS4/", "https://play239.shinyapps.io/LOWESS4/", "https://play250.shinyapps.io/LOWESS4/", "https://play251.shinyapps.io/LOWESS4/", "https://play252.shinyapps.io/LOWESS4/", "https://play253.shinyapps.io/LOWESS4/"], img:"https://jeehyoungkim-lab.github.io/images/tool7.png" },

 { name:"Alluvial Diagrams(1)", url:["https://play235.shinyapps.io/D_Alluvial_Diagrams/"], img:"https://jeehyoungkim-lab.github.io/images/alluvial%20plot.png" },
 { name:"Alluvial Diagrams(2)", url:["https://play169.shinyapps.io/Alluvial_Diagrams/", "https://play236.shinyapps.io/Alluvial_Diagrams/", "https://play278.shinyapps.io/Alluvial_Diagrams/"], img:"https://jeehyoungkim-lab.github.io/images/Alluvial-Diagrams(II).PNG" },
 { name:"Kaplan-Meier curve", url:["https://play196.shinyapps.io/survival4/", "https://play206.shinyapps.io/survival4/", "https://play214.shinyapps.io/survival4/", "https://play225.shinyapps.io/survival4/", "https://play228.shinyapps.io/survival4/", "https://play236.shinyapps.io/survival4/", "https://play250.shinyapps.io/survival4/", "https://play270.shinyapps.io/survival4/", "https://play271.shinyapps.io/survival4/", "https://play272.shinyapps.io/survival4/"], img:"https://raw.githubusercontent.com/jeehyoungkim-lab/images/288aaf842cb54b86ff917204ab6a4423377ce192/tool2.svg" },
 { name:"Coefficients Plot", url:["https://play26.shinyapps.io/Coefficients_Plot/", "https://play278.shinyapps.io/Coefficients_Plot/"], img:"https://jeehyoungkim-lab.github.io/images/Coefficients%20Plot.PNG" },
 { name:"Forest plots for Subgroups", url:["https://play273.shinyapps.io/Forest4Subgroups/"], img:"https://jeehyoungkim-lab.github.io/images/Forest%20plots%20for%20Subgroups.PNG" },
 { name:"Baseline Table", url:["https://play112.shinyapps.io/D_Baseline/", "https://play129.shinyapps.io/D_Baseline/", "https://play275.shinyapps.io/D_Baseline/", "https://plplay130ay130.shinyapps.io/D_Baseline/"], img:"https://jeehyoungkim-lab.github.io/images/table1.png" },
];

const grid = document.getElementById("grid");

function openApp(url) {
  if(!url || url.startsWith("#")) return;
  document.getElementById("grid").style.display = "none";
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("appFrame").src = url;
  document.getElementById("mainTitle").style.display = "none";
}

apps.forEach(app => {
  const tile = document.createElement("div");
  tile.className = "tile-box";

  const titleDiv = document.createElement("div");
  titleDiv.className = "tile-title";
  titleDiv.textContent = app.name;

  const wrap = document.createElement("div");
  wrap.className = "tile-img-wrap";
  const img = document.createElement("img");
  img.className = "tile-img";
  img.src = app.img;
  wrap.appendChild(img);

  const overlay = document.createElement("div");
  overlay.className = "tile-overlay";

  const urlList = Array.isArray(app.url) ? app.url : [app.url];
  
  urlList.forEach((link, index) => {
    const btn = document.createElement("a");
    btn.href = "#";
    btn.className = "btn-link";
    btn.textContent = urlList.length > 1 ? `Link ${index + 1}` : "Run App";
    btn.onclick = (e) => {
      e.preventDefault();
      openApp(link);
    };
    overlay.appendChild(btn);
  });

  tile.appendChild(titleDiv);
  tile.appendChild(wrap);
  tile.appendChild(overlay);
  grid.appendChild(tile);
});

document.getElementById("backBtn").onclick = () => {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("grid").style.display = "grid";
  document.getElementById("appFrame").src = "";
  document.getElementById("mainTitle").style.display = "block";
};
</script>
</body>
</html>
