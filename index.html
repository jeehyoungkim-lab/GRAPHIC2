<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Graphs for Research Articles: Precision, Honesty, and Informative Communication(GRAPHIC) Tools</title>
<style>
  /* 전체 레이아웃 기본 */
  html, body { height: 100%; margin:0; font-family: Arial, sans-serif; background-color: #fdfefe; overflow-x: hidden; }

  /* 제목 */
  h2 { color: #0F4E47; text-align:center; padding:20px; margin:0; }

  /* 4열 고정 그리드 */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 15px;
    padding: 20px;
    box-sizing: border-box;
    max-width: 100%;
  }

  /* 타일 박스 */
  .tile-box {
    background-color: #0F4E47;
    border: 1px solid #ccc;
    display: flex;
    flex-direction: column;
    aspect-ratio: 1 / 1;
    position: relative;
    overflow: hidden;
    box-sizing: border-box;
  }

  /* 제목 영역 */
  .tile-title {
    flex: 0 0 40px;
    color: #FDFEFE;
    font-weight: bold;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 5px;
    z-index: 5;
  }

  /* 이미지 영역 */
  .tile-img-wrap {
    flex: 1;
    width: 100%;
    position: relative;
    overflow: hidden;
  }

  .tile-img {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: fill;
  }

  /* --- 4분할 버튼 오버레이 --- */
  .tile-overlay {
    position: absolute;
    top: 40px; /* 제목 아래부터 시작 */
    left: 0;
    width: 100%;
    height: calc(100% - 40px);
    background: rgba(15, 78, 71, 0.4); /* 이미지 살짝 보이게 투명도 조절 */
    display: grid;
    grid-template-columns: 1fr 1fr; /* 기본 2열 */
    grid-auto-rows: 1fr; /* 높이 균등 분할 */
    gap: 1px; /* 버튼 사이 경계선 효과 */
    opacity: 0;
    transition: opacity 0.3s ease;
    z-index: 10;
  }

  .tile-box:hover .tile-overlay {
    opacity: 1;
  }

  /* 버튼 스타일 */
  .btn-link {
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.95);
    color: #0F4E47;
    text-decoration: none;
    font-size: 14px;
    font-weight: bold;
    text-align: center;
    padding: 5px;
    transition: background 0.2s;
    border: 0.5px solid #0F4E47;
  }

  /* 버튼 배치 로직 */
  .btn-link:only-child { grid-column: span 2; } /* 1개일 때 꽉 채움 */
  .btn-link:nth-child(3):last-child { grid-column: span 2; } /* 3개일 때 마지막 버튼 가로 확장 */

  .btn-link:hover {
    background: #FFEB3B;
    color: #000;
  }

  /* 뷰어(iframe) 영역 */
  #viewer {
    display:none;
    width:100%;
    height:100vh;
    flex-direction: column;
  }
  #viewer iframe {
    flex:1;
    width:100%;
    border:none;
  }
  #backBtn {
    background:#FDFEFE;
    color:#0F4E47;
    border:1px solid #0F4E47;
    border-radius:8px;
    font-size:18px;
    font-weight:bold;
    padding:10px 20px;
    margin:10px;
    cursor:pointer;
    align-self:flex-end;
  }
</style>
</head>
<body>

<h2 id="mainTitle">Graphs for Research Articles: Precision, Honesty, and Informative Communication(GRAPHIC) Tools</h2>

<div id="grid" class="grid"></div>

<div id="viewer">
  <button id="backBtn">🏠 Show List of GRAPHIC Tools</button>
  <iframe id="appFrame"></iframe>
</div>

<script>
const apps = [
 { name:"Boxplot and jitter plot", url:"https://play237.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Plot with error bar", url:"https://play240.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 // 테스트용: url에 배열을 넣어 여러 버튼 생성 가능
 { name:"Plot with significance", url:["https://play241.shinyapps.io", "#link2", "#link3", "#link4"], img:"https://jeehyoungkim-lab.github.io" },
 { name:"RainCloud plot", url:"https://play274.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Densitogram and Histogram", url:"https://play242.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Scatter plot with label", url:"https://play277.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Matrix Correlations", url:"https://play276.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"LOWESS", url:"https://play239.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"count bar with CI", url:"https://play234.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Matrix bubble plot", url:"https://play120.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Alluvial Diagrams(1)", url:"https://play235.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Alluvial Diagrams(2)", url:"https://play236.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Kaplan-Meier curve", url:"https://play236.shinyapps.io", img:"https://raw.githubusercontent.com" },
 { name:"Coefficients Plot", url:"https://play278.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Forest plots for Subgroups", url:"https://play273.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
 { name:"Baseline Table", url:"https://play275.shinyapps.io", img:"https://jeehyoungkim-lab.github.io" },
];

const grid = document.getElementById("grid");

// iframe 실행 함수
function openApp(targetUrl) {
  if(!targetUrl || targetUrl === "#") return;
  document.getElementById("grid").style.display = "none";
  document.getElementById("viewer").style.display = "flex";
  document.getElementById("appFrame").src = targetUrl;
  document.getElementById("mainTitle").style.display = "none";
}

// 타일 동적 생성
apps.forEach(app => {
  const tile = document.createElement("div");
  tile.className = "tile-box";

  // 내부 구조 생성
  tile.innerHTML = `
    <div class="tile-title">${app.name}</div>
    <div class="tile-img-wrap">
      <img src="${app.img}" class="tile-img">
    </div>
    <div class="tile-overlay"></div>
  `;

  const overlay = tile.querySelector(".tile-overlay");
  
  // url이 문자열이면 배열로 변환하여 처리
  const urlList = Array.isArray(app.url) ? app.url : [app.url];
  
  urlList.forEach((link, index) => {
    const btn = document.createElement("a");
    btn.href = "#";
    btn.className = "btn-link";
    // 버튼 이름 설정 (여러 개일 때만 번호 표시)
    btn.textContent = urlList.length > 1 ? `Link ${index + 1}` : "Run App";
    
    btn.onclick = (e) => {
      e.preventDefault();
      openApp(link);
    };
    overlay.appendChild(btn);
  });

  grid.appendChild(tile);
});

// 돌아가기 버튼
document.getElementById("backBtn").onclick = () => {
  document.getElementById("viewer").style.display = "none";
  document.getElementById("grid").style.display = "grid";
  document.getElementById("appFrame").src = "";
  document.getElementById("mainTitle").style.display = "block";
};
</script>

</body>
</html>
